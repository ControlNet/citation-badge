name: Build

on:
  push:
    branches: [ master, main ]
  schedule:
    # run per hour
    - cron: "0 * * * *"
  workflow_dispatch:  # Allow manual triggering

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
      DEPLOY_TARGET: ${{ secrets.DEPLOY_TARGET }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check if dist branch exists
        id: check_branch
        run: |
          if git ls-remote --heads origin dist | grep dist; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Download previous dist files
        if: steps.check_branch.outputs.exists == 'true'
        uses: actions/checkout@v4
        with:
          ref: dist
          path: dist

      - name: Create dist directory if it doesn't exist
        if: steps.check_branch.outputs.exists == 'false'
        run: mkdir -p dist

      - name: Generate badges
        shell: bash
        env:
          SCHOLAR: ${{ secrets.SCHOLAR }}
          WOS_OVERWRITE: ${{ secrets.WOS_OVERWRITE }}
        run: |
          : "${SCHOLAR:?SCHOLAR secret is required}"
          python -u main.py --scholar="${SCHOLAR}" --timeout 180 --gen_summary

      - name: Check if citation data was updated
        id: check_update
        run: |
          if [ -f "citation_updated.flag" ]; then
            flag_value=$(cat citation_updated.flag)
            if [ "$flag_value" = "true" ]; then
              echo "updated=true" >> $GITHUB_OUTPUT
              echo "Citation data was successfully updated"
            else
              echo "updated=false" >> $GITHUB_OUTPUT
              echo "No citation data updates detected"
            fi
            rm -f citation_updated.flag
          else
            echo "updated=false" >> $GITHUB_OUTPUT
            echo "Citation update flag not found"
          fi

      - name: Adding summary
        run: cat summary.md >> $GITHUB_STEP_SUMMARY

      - name: Configure Git
        if: ${{ steps.check_update.outputs.updated == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -rf .git
          rm -rf dist/.git
          cd dist

          if pages_cname="$(gh api -X GET "repos/${GITHUB_REPOSITORY}/pages" --jq '.cname // ""' 2>/dev/null)" && [ -n "${pages_cname}" ]; then
            printf '%s\n' "${pages_cname}" > CNAME
          else
            rm -f CNAME
          fi

          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update badges"
          
          # Use the repository that triggered the workflow
          REPO_URL="https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git remote add origin $REPO_URL

      - name: Push to dist branch
        if: ${{ steps.check_update.outputs.updated == 'true' }}
        uses: ad-m/github-push-action@master
        with:
          branch: dist
          force: true
          directory: dist

      - name: Trigger deployment
        if: ${{ steps.check_update.outputs.updated == 'true' && env.DEPLOY_TOKEN != '' && env.DEPLOY_TARGET != '' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ env.DEPLOY_TOKEN }}
          script: |
            try {
              const match = process.env.DEPLOY_TARGET.match(/^([^/]+)\/([^@]+)@([^:]+):(.+)$/);
              if (!match) {
                throw new Error('DEPLOY_TARGET must use owner/repo@ref:workflow_id format');
              }
              const [, owner, repo, ref, workflow_id] = match;
              const response = await github.rest.actions.createWorkflowDispatch({
                owner,
                repo,
                workflow_id,
                ref
              });
              console.log('Successfully triggered deployment workflow');
            } catch (error) {
              console.log('Failed to trigger deployment:', error.message);
              throw error;
            }

      - name: Deployment skipped
        if: ${{ steps.check_update.outputs.updated == 'true' && (env.DEPLOY_TOKEN == '' || env.DEPLOY_TARGET == '') }}
        run: |
          echo "⚠️ Citation data was updated but deployment was skipped"
          echo "💡 Add DEPLOY_TOKEN and DEPLOY_TARGET secrets to enable automatic deployment triggering"
